# Event-log schema for the travel scenario.
#
# Read by harness/src/tools/event.ts at runtime. The harness contains
# no travel-shaped column names; everything here is scenario data.
# Absence of this file makes the event-layer tools (ingest_event,
# get_case_timeline) report `unsupported` with an actionable message.

table: events
type_column: event_type
timestamp_column: timestamp
metadata_column: metadata
id_column: event_id

correlation_keys:
    - name: booking_id
      column: booking_id
      kind: int
      description: Booking / case identifier — primary correlation for process mining.
    - name: flight_id
      column: flight_id
      kind: int
      description: Flight identifier — correlates events to an operational flight.
    - name: customer_id
      column: customer_id
      kind: int
      description: Customer identifier.
    - name: ticket_id
      column: ticket_id
      kind: int
      description: Ticket identifier.

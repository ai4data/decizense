name: travel
display_name: SkyJet Travel Operations
description: >
    A travel booking platform where customers search for flights, book itineraries,
    and travel through a journey lifecycle. Agents handle flight operations,
    booking management, and customer service across disruption scenarios.
domain: travel-operations
database:
    type: postgresql
    host: localhost
    port: 5433
    name: travel_db
    user: travel_admin
    password: "{{ env('TRAVEL_DB_PASSWORD', 'travel_pass') }}"

catalog:
    provider: openmetadata
    url: "{{ env('CATALOG_URL', 'http://localhost:8585') }}"
    token: "{{ env('CATALOG_TOKEN') }}"
    service_name: travel_postgres

auth:
    mode: "{{ env('AUTH_MODE', 'config-only') }}"
    trust_domain: dazense.local
    verify_strategy: shared_secret
    jwt_secret: "{{ env('JWT_SECRET') }}"
    audience: dazense-harness
    # Phase 3 delegation: if true, tokens without act claim are rejected.
    # Enable when using Zitadel or another IdP for RFC 8693 token exchange.
    require_delegation: false
    # JWT claim that identifies the agent (default: "sub")
    agent_claim: sub

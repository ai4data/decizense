models:
  customers:
    table: customers
    schema: main
    primary_key: customer_id
    dimensions:
      customer_id:
        column: customer_id
        description: Unique identifier for each customer
      first_name:
        column: first_name
        description: "Customer's first name (PII)"
      last_name:
        column: last_name
        description: "Customer's last name (PII)"
      first_order:
        column: first_order
        description: Date (UTC) of the customer's first order
      most_recent_order:
        column: most_recent_order
        description: Date (UTC) of the customer's most recent order
      number_of_orders:
        column: number_of_orders
        description: Count of orders placed by the customer
      customer_lifetime_value:
        column: customer_lifetime_value
        description: Total value (AUD) of the customer's orders
    measures:
      customer_count:
        type: count
        description: Total number of customers
      customer_count_distinct:
        type: count_distinct
        column: customer_id
        description: Distinct customer count (useful in joins)
      total_lifetime_value:
        column: customer_lifetime_value
        type: sum
        description: Sum of all customer lifetime values
      avg_lifetime_value:
        column: customer_lifetime_value
        type: avg
        description: Average customer lifetime value
      avg_orders_per_customer:
        column: number_of_orders
        type: avg
        description: Average number of orders per customer
      max_lifetime_value:
        column: customer_lifetime_value
        type: max
        description: Highest single-customer lifetime value

  orders:
    table: orders
    schema: main
    primary_key: order_id
    time_dimension: order_date
    dimensions:
      order_id:
        column: order_id
        description: Unique identifier for each order
      customer_id:
        column: customer_id
        description: Foreign key to customers table
      order_date:
        column: order_date
        description: Date (UTC) the order was placed
      status:
        column: status
        description: >
          Order fulfillment status. Accepted values: placed (not yet left warehouse),
          shipped (in transit), completed (received by customer), return_pending
          (return requested, not yet received), returned (received back at warehouse).
    measures:
      order_count:
        type: count
        description: Total number of orders
      total_revenue:
        column: amount
        type: sum
        description: "Net revenue in AUD — automatically excludes returned and return_pending orders."
        filters:
          - column: status
            operator: not_in
            value: ["returned", "return_pending"]
      avg_order_value:
        column: amount
        type: avg
        description: Average order value in AUD
      min_order_value:
        column: amount
        type: min
        description: Smallest order amount in AUD
      max_order_value:
        column: amount
        type: max
        description: Largest order amount in AUD
      credit_card_revenue:
        column: credit_card_amount
        type: sum
        description: Total amount (AUD) paid via credit card
      coupon_revenue:
        column: coupon_amount
        type: sum
        description: Total amount (AUD) paid via coupons
      bank_transfer_revenue:
        column: bank_transfer_amount
        type: sum
        description: Total amount (AUD) paid via bank transfer
      gift_card_revenue:
        column: gift_card_amount
        type: sum
        description: Total amount (AUD) paid via gift cards
    joins:
      customer:
        to_model: customers
        foreign_key: customer_id
        related_key: customer_id
        type: many_to_one
        description: "Each order belongs to one customer; a customer can have many orders."

  payments:
    table: stg_payments
    schema: main
    primary_key: payment_id
    dimensions:
      payment_id:
        column: payment_id
        description: Unique identifier for each payment
      order_id:
        column: order_id
        description: Foreign key to orders table
      payment_method:
        column: payment_method
        description: "Payment instrument used. Accepted values: credit_card, bank_transfer, coupon, gift_card."
    measures:
      payment_count:
        type: count
        description: Total number of payment transactions
      total_payment_amount:
        column: amount
        type: sum
        description: Total amount (AUD) across all payment transactions. Amounts are converted from cents to dollars in staging.
      avg_payment_amount:
        column: amount
        type: avg
        description: Average payment transaction amount in AUD
    joins:
      order:
        to_model: orders
        foreign_key: order_id
        related_key: order_id
        type: many_to_one
        description: "Each payment belongs to one order; an order can have multiple payments (split across methods)."
